name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix_*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_live_postgres:
        description: "Run the live Postgres integration job"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-name:
    name: Branch name policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          case "$BRANCH_NAME" in
            main|feature/*|fix_*) exit 0 ;;
            *)
              echo "::error::Branch '$BRANCH_NAME' must be main, feature/<name>, or fix_<timestamp-or-uuid>."
              exit 1
              ;;
          esac

  backend:
    name: Python backend
    runs-on: ubuntu-latest
    needs: branch-name
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python dependencies
        run: uv sync --extra dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Run pytest
        run: uv run pytest -q

  frontend:
    name: Next.js frontend
    runs-on: ubuntu-latest
    needs: branch-name
    defaults:
      run:
        working-directory: frontend/next-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/next-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Race and reducer tests
        run: npm run test:race

  rust-services:
    name: Rust service (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: branch-name
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/retrieval-ranker
          - services/voice-edge
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.service }}

      - name: Cargo format check
        working-directory: ${{ matrix.service }}
        run: cargo fmt --all -- --check

      - name: Cargo test
        working-directory: ${{ matrix.service }}
        run: cargo test --locked

  live-postgres:
    name: Live Postgres (main/manual)
    runs-on: ubuntu-latest
    needs: backend
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.run_live_postgres) }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentstudio
          POSTGRES_PASSWORD: agentstudio
          POSTGRES_DB: agentstudio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentstudio -d agentstudio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://agentstudio:agentstudio@localhost:5432/agentstudio
      LIVE_POSTGRES: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python dependencies
        run: uv sync --extra dev

      - name: Run live Postgres pytest suite
        run: uv run pytest tests/test_live_postgres.py -q -rs
