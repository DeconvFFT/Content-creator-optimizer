services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: all-about-llms-postgres
    environment:
      POSTGRES_USER: agentstudio
      POSTGRES_PASSWORD: agentstudio
      POSTGRES_DB: agentstudio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/001_foundation.sql:/docker-entrypoint-initdb.d/001_foundation.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentstudio -d agentstudio"]
      interval: 5s
      timeout: 5s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    container_name: all-about-llms-livekit
    profiles:
      - voice
    command: ["--dev", "--bind", "0.0.0.0"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

volumes:
  postgres-data:
